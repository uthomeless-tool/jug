<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Juggler-Analyzer-V9</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #f0f2f5; color: #333; margin: 0; padding: 10px; padding-bottom: 50px; }
        .card { background: #fff; padding: 15px; border-radius: 12px; margin-bottom: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        h2 { font-size: 0.85rem; color: #444; margin: 0 0 10px 0; border-left: 4px solid #007bff; padding-left: 10px; font-weight: bold; }
        
        /* 機種選択タブ（横スクロール対応） */
        .tab-scroll { overflow-x: auto; display: flex; gap: 6px; padding-bottom: 8px; margin-bottom: 12px; -webkit-overflow-scrolling: touch; }
        .tab { flex: 0 0 auto; padding: 10px 15px; text-align: center; background: #e9ecef; border-radius: 8px; font-size: 0.75rem; font-weight: bold; cursor: pointer; border: 2px solid transparent; white-space: nowrap; }
        .tab.active { background: #fff; border-color: #007bff; color: #007bff; }

        .input-row { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 12px; }
        .input-group { flex: 1; min-width: 80px; }
        label { display: block; font-size: 0.7rem; color: #666; margin-bottom: 4px; font-weight: bold; }
        input { width: 100%; box-sizing: border-box; padding: 12px; border: 1px solid #ccc; border-radius: 8px; font-size: 1.1rem; }
        
        .diff-input-wrapper { display: flex; gap: 4px; }
        .sign-btn { width: 50px; color: #fff; border: none; border-radius: 8px; font-weight: bold; font-size: 1.2rem; cursor: pointer; }

        button.calc-btn { width: 100%; padding: 14px; background: #007bff; border: none; border-radius: 8px; font-weight: bold; font-size: 1rem; color: #fff; cursor: pointer; margin-top: 10px; }
        
        .status-display { display: flex; justify-content: space-around; background: #e9ecef; padding: 10px; border-radius: 8px; margin: 15px 0; font-size: 0.8rem; font-weight: bold; flex-wrap: wrap; gap: 5px; }
        .status-item { flex: 1; min-width: 60px; text-align: center; }
        .status-label { display: block; font-size: 0.65rem; color: #666; margin-bottom: 2px; }

        .expect-box { background: #f8f9fa; padding: 12px; border-radius: 8px; margin-top: 15px; border: 1px solid #dee2e6; }
        .expect-row { display: flex; justify-content: space-between; font-size: 0.9rem; margin-bottom: 4px; }
        .expect-val { font-weight: bold; color: #007bff; }

        .bar-row { margin-bottom: 10px; }
        .bar-label { font-size: 0.85rem; display: flex; justify-content: space-between; margin-bottom: 3px; }
        .bar-bg { background: #e9ecef; height: 22px; border-radius: 11px; overflow: hidden; }
        .bar-fill { height: 100%; background: #adb5bd; transition: width 0.4s ease-out; }
        .bar-fill.max { background: #007bff; }

        table { width: 100%; border-collapse: collapse; font-size: 0.7rem; text-align: center; }
        th { background: #f8f9fa; padding: 6px; color: #666; border-bottom: 2px solid #dee2e6; }
        td { border-bottom: 1px solid #eee; padding: 8px; }
        
        /* 確率近似マーキング */
        .match-bb { background-color: #ffe5e5 !important; color: #d00000; font-weight: bold; }
        .match-rb { background-color: #e5f0ff !important; color: #0056b3; font-weight: bold; }
        .match-total { background-color: #fff3cd !important; color: #856404; font-weight: bold; }
        .match-grape { background-color: #e8f5e9 !important; color: #2e7d32; font-weight: bold; }
    </style>
</head>
<body>

<div class="card">
    <h2>機種選択</h2>
    <div class="tab-scroll" id="tabContainer">
        </div>

    <h2 id="model-name">マイジャグラーⅤ</h2>
    <div class="input-row">
        <div class="input-group"><label>総回転数</label><input type="number" id="totalG" inputmode="numeric"></div>
        <div class="input-group"><label>BIG</label><input type="number" id="bbCount" inputmode="numeric"></div>
        <div class="input-group"><label>REG</label><input type="number" id="rbCount" inputmode="numeric"></div>
    </div>
    
    <div class="input-row">
        <div class="input-group">
            <label>差枚数（任意）</label>
            <div class="diff-input-wrapper">
                <button type="button" id="signBtn" class="sign-btn" style="background:#007bff" onclick="toggleSign()">＋</button>
                <input type="number" id="diffCoins" inputmode="numeric" placeholder="空欄可">
            </div>
        </div>
        <div class="input-group"><label>ぶどう実数（任意）</label><input type="number" id="grapeCount" inputmode="numeric" placeholder="空欄可"></div>
    </div>

    <button class="calc-btn" onclick="calculate()">判別を実行</button>

    <div id="statusResult"></div>
    <div id="graphResult"></div>
    
    <div id="expectResult" class="expect-box" style="display:none;">
        <div class="expect-row"><span>期待設定</span><span id="exp-setting" class="expect-val">-</span></div>
        <div class="expect-row"><span>期待機械割</span><span id="exp-payout" class="expect-val">-</span></div>
    </div>
</div>

<div class="card">
    <h2>スペック表</h2>
    <table id="specTable">
        <thead><tr><th>設定</th><th>BB</th><th>RB</th><th>合算</th><th>ぶどう</th><th>機械割</th></tr></thead>
        <tbody id="specBody"></tbody>
    </table>
</div>

<script>
let currentSign = 1;
let currentModel = 'my5';

const modelData = {
    my5: { name: "マイジャグⅤ", specs: [
        { s:1, bb:273.1, rb:409.6, total:163.8, grape:5.90, pay:97.0 },
        { s:2, bb:270.8, rb:385.5, total:159.1, grape:5.85, pay:98.0 },

        { s:4, bb:254.0, rb:290.0, total:135.4, grape:5.78, pay:102.8 },
        { s:5, bb:240.1, rb:268.6, total:126.8, grape:5.76, pay:105.3 },
        { s:6, bb:229.1, rb:229.1, total:114.6, grape:5.66, pay:109.4 }
    ]},
    go3: { name: "ゴージャグ3", specs: [
        { s:1, bb:259.0, rb:354.2, total:149.6, grape:6.25, pay:97.2 },
        { s:2, bb:258.0, rb:332.7, total:145.3, grape:6.20, pay:98.2 },
        { s:3, bb:257.0, rb:306.2, total:139.7, grape:6.15, pay:99.4 },
        { s:4, bb:254.0, rb:268.6, total:130.5, grape:6.07, pay:101.6 },
        { s:5, bb:247.3, rb:247.3, total:123.7, grape:6.00, pay:103.8 },
        { s:6, bb:234.9, rb:234.9, total:117.4, grape:5.92, pay:106.5 }
    ]},
    happy3: { name: "ハッピーVⅢ", specs: [
        { s:1, bb:273.1, rb:397.2, total:161.8, grape:6.04, pay:97.2 },
        { s:2, bb:270.8, rb:362.1, total:154.9, grape:6.01, pay:98.2 },
        { s:3, bb:263.2, rb:332.7, total:146.9, grape:5.98, pay:99.4 },
        { s:4, bb:254.0, rb:300.6, total:137.7, grape:5.86, pay:101.6 },
        { s:5, bb:239.2, rb:273.1, total:127.5, grape:5.84, pay:103.8 },
        { s:6, bb:226.0, rb:256.0, total:120.0, grape:5.82, pay:106.5 }
    ]},
    neoim: { name: "ネオアイムEX", specs: [
        { s:1, bb:273.1, rb:439.8, total:168.5, grape:6.02, pay:97.0 },
        { s:2, bb:269.7, rb:399.6, total:161.0, grape:6.02, pay:98.0 },
        { s:3, bb:269.7, rb:331.0, total:148.6, grape:6.02, pay:99.5 },
        { s:4, bb:259.0, rb:315.1, total:142.2, grape:6.02, pay:101.6 },
        { s:5, bb:259.0, rb:255.0, total:128.5, grape:6.02, pay:103.3 },
        { s:6, bb:255.0, rb:255.0, total:127.5, grape:5.85, pay:105.5 }
    ]},
    girls: { name: "ガールズSS", specs: [
        { s:1, bb:273.1, rb:381.0, total:159.1, grape:6.01, pay:97.3 },
        { s:2, bb:270.8, rb:350.5, total:152.8, grape:6.01, pay:98.3 },
        { s:3, bb:260.1, rb:316.6, total:142.8, grape:6.01, pay:99.4 },
        { s:4, bb:250.1, rb:281.3, total:132.4, grape:6.01, pay:102.1 },
        { s:5, bb:243.6, rb:270.8, total:128.3, grape:5.92, pay:104.5 },
        { s:6, bb:226.0, rb:252.1, total:119.2, grape:5.89, pay:107.5 }
    ]},
    mr: { name: "ミスター", specs: [
        { s:1, bb:268.6, rb:374.5, total:156.4, grape:6.22, pay:97.3 },
        { s:2, bb:267.5, rb:354.2, total:152.4, grape:6.16, pay:98.4 },
        { s:3, bb:260.1, rb:331.0, total:145.6, grape:6.12, pay:99.6 },
        { s:4, bb:249.2, rb:291.3, total:134.3, grape:6.09, pay:102.2 },
        { s:5, bb:240.9, rb:257.0, total:124.4, grape:6.05, pay:105.0 },
        { s:6, bb:237.4, rb:237.4, total:118.7, grape:6.02, pay:107.3 }
    ]},
    ultra: { name: "ウルトラミラクル", specs: [
        { s:1, bb:267.5, rb:425.6, total:164.3, grape:5.940, pay:97.3 },
        { s:2, bb:261.1, rb:402.1, total:158.3, grape:5.938, pay:98.3 },
        { s:3, bb:256.0, rb:350.5, total:147.9, grape:5.936, pay:99.8 },
        { s:4, bb:242.7, rb:322.8, total:138.6, grape:5.934, pay:102.5 },
        { s:5, bb:233.2, rb:297.9, total:130.8, grape:5.933, pay:104.8 },
        { s:6, bb:216.3, rb:277.7, total:121.6, grape:5.929, pay:108.8 }
    ]},
    funky2: { name: "ファンキー2", specs: [
        { s:1, bb:266.4, rb:439.8, total:165.9, grape:5.942, pay:97.0 },
        { s:2, bb:259.0, rb:407.1, total:158.3, grape:5.933, pay:98.5 },
        { s:3, bb:256.0, rb:366.1, total:150.7, grape:5.884, pay:99.8 },
        { s:4, bb:249.2, rb:322.8, total:140.6, grape:5.835, pay:102.0 },
        { s:5, bb:240.1, rb:299.3, total:133.2, grape:5.806, pay:104.3 },
        { s:6, bb:219.9, rb:262.1, total:119.6, grape:5.77, pay:109.0 }
    ]}
};

function init() {
    const container = document.getElementById('tabContainer');
    Object.keys(modelData).forEach(key => {
        const div = document.createElement('div');
        div.id = `tab-${key}`;
        div.className = `tab ${key === currentModel ? 'active' : ''}`;
        div.innerText = modelData[key].name;
        div.onclick = () => switchModel(key);
        container.appendChild(div);
    });
    renderTable();
}

function renderTable() {
    const data = modelData[currentModel];
    document.getElementById('model-name').innerText = data.name;
    const tbody = document.getElementById('specBody');
    tbody.innerHTML = '';
    data.specs.forEach((s, i) => {
        tbody.innerHTML += `
            <tr id="row-${i}">
                <td>${s.s}</td>
                <td class="col-bb">1/${s.bb.toFixed(1)}</td>
                <td class="col-rb">1/${s.rb.toFixed(1)}</td>
                <td class="col-total">1/${s.total.toFixed(1)}</td>
                <td class="col-grape">1/${s.grape.toFixed(2)}</td>
                <td>${s.pay.toFixed(1)}%</td>
            </tr>`;
    });
}

function switchModel(m) {
    currentModel = m;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.getElementById(`tab-${m}`).classList.add('active');
    renderTable();
    calculate(); // 機種切り替え時に再計算
}

function toggleSign() {
    const btn = document.getElementById('signBtn');
    currentSign *= -1;
    btn.innerText = currentSign === 1 ? '＋' : '－';
    btn.style.background = currentSign === 1 ? '#007bff' : '#d00000';
}

function nCr_log(n, r) {
    if (r < 0 || r > n) return -Infinity;
    let res = 0;
    const k = Math.min(r, n - r);
    for (let i = 1; i <= k; i++) res += Math.log(n - i + 1) - Math.log(i);
    return res;
}

function logBinomial(n, k, p) {
    if (n <= 0 || k < 0 || n < k) return -Infinity;
    return nCr_log(n, k) + k * Math.log(p) + (n - k) * Math.log(1 - p);
}

function calculate() {
    const G = parseInt(document.getElementById('totalG').value);
    const BB = parseInt(document.getElementById('bbCount').value);
    const RB = parseInt(document.getElementById('rbCount').value);
    const diffInput = document.getElementById('diffCoins').value;
    const realGrape = parseInt(document.getElementById('grapeCount').value);
    const specs = modelData[currentModel].specs;

    if (isNaN(G) || isNaN(BB) || isNaN(RB)) return;

    let useGrape = 0;
    let grapeLabel = "---";

    if (!isNaN(realGrape)) {
        useGrape = realGrape;
        grapeLabel = "実数";
    } else if (diffInput !== "") {
        const diff = parseInt(diffInput) * currentSign;
        const K = 2.5312; // 基本的なベース補正
        const bonusPay = (BB * 240) + (RB * 96);
        useGrape = Math.round((diff + (G * K) - bonusPay) / 8);
        grapeLabel = "逆算";
    }

    // ステータス更新
    document.getElementById('statusResult').innerHTML = `
        <div class="status-display">
            <div class="status-item"><span class="status-label">BIG</span>1/${BB>0?(G/BB).toFixed(1):"---"}</div>
            <div class="status-item"><span class="status-label">REG</span>1/${RB>0?(G/RB).toFixed(1):"---"}</div>
            <div class="status-item"><span class="status-label">合算</span>1/${(BB+RB)>0?(G/(BB+RB)).toFixed(1):"---"}</div>
            <div class="status-item"><span class="status-label">ぶどう(${grapeLabel})</span>1/${useGrape>0?(G/useGrape).toFixed(2):"---"}</div>
        </div>
    `;

    // ハイライト処理
    let minD = [Infinity,Infinity,Infinity,Infinity], best = [0,0,0,0];
    specs.forEach((s, i) => {
        const row = document.getElementById(`row-${i}`);
        ['col-bb','col-rb','col-total','col-grape'].forEach(c => row.querySelector('.'+c).className = c);
        if (BB>0 && Math.abs(G/BB-s.bb) < minD[0]) { minD[0]=Math.abs(G/BB-s.bb); best[0]=i; }
        if (RB>0 && Math.abs(G/RB-s.rb) < minD[1]) { minD[1]=Math.abs(G/RB-s.rb); best[1]=i; }
        if ((BB+RB)>0 && Math.abs(G/(BB+RB)-s.total) < minD[2]) { minD[2]=Math.abs(G/(BB+RB)-s.total); best[2]=i; }
        if (useGrape>0 && Math.abs(G/useGrape-s.grape) < minD[3]) { minD[3]=Math.abs(G/useGrape-s.grape); best[3]=i; }
    });
    document.querySelector(`#row-${best[0]} .col-bb`).classList.add("match-bb");
    document.querySelector(`#row-${best[1]} .col-rb`).classList.add("match-rb");
    document.querySelector(`#row-${best[2]} .col-total`).classList.add("match-total");
    if (useGrape > 0) document.querySelector(`#row-${best[3]} .col-grape`).classList.add("match-grape");

    // 推測計算（ベイズ）
    let likelihoods = specs.map(s => {
        let logP = logBinomial(G, BB, 1/s.bb) + logBinomial(G, RB, 1/s.rb);
        if (useGrape > 0) logP += logBinomial(G, useGrape, 1/s.grape);
        return Math.exp(logP);
    });
    const sumL = likelihoods.reduce((a, b) => a + b, 0);
    const probs = likelihoods.map(l => (sumL > 0 ? l / sumL : 1/6));

    let expSetting = 0, expPayout = 0;
    probs.forEach((p, i) => {
        expSetting += (i + 1) * p;
        expPayout += specs[i].pay * p;
    });

    // グラフ更新
    let html = "<h2>推測設定配分</h2>";
    const maxP = Math.max(...probs);
    probs.forEach((p, i) => {
        html += `<div class="bar-row"><div class="bar-label"><span>設定 ${i+1}</span><span>${(p*100).toFixed(1)}%</span></div>
                <div class="bar-bg"><div class="bar-fill ${p===maxP?'max':''}" style="width:${p*100}%"></div></div></div>`;
    });
    document.getElementById('graphResult').innerHTML = html;
    document.getElementById('expectResult').style.display = 'block';
    document.getElementById('exp-setting').innerText = expSetting.toFixed(2);
    document.getElementById('exp-payout').innerText = expPayout.toFixed(3) + " %";
}

init();
</script>
</body>
</html>
